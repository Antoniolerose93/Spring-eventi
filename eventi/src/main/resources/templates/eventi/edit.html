<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link th:rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <title>Modifica evento</title>
</head>
<body>
    <nav th:replace="~{navbar :: navbar('Eventi')}"></nav>
    <div class="container mt-4">
        <h1 class="text-center mb-4">Mofica le informazioni dell'evento</h1>
        <hr>

        <div class="card mx-auto" style="max-width: 600px;">
            <div class="card-body">
                <form th:action="@{/eventi/edit/{id}(id=${events.id})}" th:object="${events}" method="post">
                    <input type="hidden" th:field="*{id}">
                    <div class="mb-3">
                        <label for="name" class="form-label">Evento:</label>
                        <input type="text" th:field ="*{name}" class="form-control" id="name" readonly>
                    </div>
                    <div class="mb-3">
                        <label for="city" class="form-label">Città:</label>
                        <input type="text" th:field ="*{city}" class="form-control" id="city" readonly>
                    </div>
                    <div class="mb-3">
                        <label for="location" class="form-label">Luogo:</label>
                        <input type="text" th:field ="*{location}" class="form-control" id="location" readonly>
                    </div>
                    <div class="mb-3">
                        <label for="date" class="form-label">Data:</label>
                        <input type="date" th:field ="*{date}" class="form-control" id="date">
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Descrizione:</label>
                        <input type="text" th:field ="*{description}" class="form-control" id="description">
                    </div>
                    <div class="mb-3">
                        <label for="picture" class="form-label">Immagine:</label>
                        <input type="text" th:field ="*{picture}" class="form-control" id="picture">
                    </div>
                    <input type="hidden" th:field="*{price}">
                    <input type="hidden" th:field="*{totalTickets}">
                    <input type="hidden" th:field="*{soldTickets}">
                    <input type="hidden" th:field="*{maxTicketsForClient}">
                    <input type="hidden" th:name="eventCategory" th:value="${events.eventCategory.id}">
                    <div class="d-flex justify-content-between">
                        <a th:href="@{/event/}" class="btn btn-secondary">Annulla</a>
                        <button type="submit" class="btn btn-primary">Salva modifiche</button>
                    </div>
                </form>
            </div>

        </div>

    </div>
    
    <script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
