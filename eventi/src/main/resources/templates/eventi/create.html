<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link th:rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <title>Inserisci evento</title>
</head>
<body>
    <nav th:replace="~{navbar :: navbar('Eventi')}"></nav>

    <div class="container">
        <div class="content">
            <h1 class="text-center py-3">Inserisci l'evento</h1>
            <hr/>
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            <form id="event-form" th:object="${events}" th:action="@{/eventi/create}" method="post">    
                <div class="row mb-3">
                    <div class="col-4">
                        <input type="text" class="form-control" th:field="*{name}" th:errorClass="is-invalid" placeholder="Nome evento" aria-label ="Nome evento">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>
                    <div class="col-4">
                        <input type="text" class="form-control" th:field="*{description}" th:errorClass="is-invalid" placeholder="Descrizione" aria-label ="Descrizione">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                    </div>
                    <div class="col-4">
                        <input type="date" class="form-control" th:field="*{date}" th:errorClass="is-invalid" aria-label ="Data">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('date')}" th:errors="*{date}"></div>
                    </div>
                </div>
                <div class="row mb-3">
                    <div class="col-3">
                        <input type="text" class="form-control" th:field="*{city}" th:errorClass="is-invalid" placeholder="Città" aria-label ="Città">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('city')}" th:errors="*{city}"></div>
                    </div>
                    <div class="col-3">
                        <input type="text" class="form-control" th:field="*{location}" th:errorClass="is-invalid" placeholder="Luogo" aria-label ="Luogo">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('location')}" th:errors="*{location}"></div>
                    </div>
                    <div class="col-3">
                        <select id="eventCategory" 
                                th:field ="*{eventCategory}"
                                class="form-select" aria-label="Scegli la categoria">
                            <option value="" selected>Scegli la categoria dell'evento</option>
                            <option th:each="cat:${allEventsCategories}"
                                th:value="${cat.id}"
                                th:text="${cat.name}">
                            </option>
                        </select>
                    </div>
                    <div class="col-3">
                        <input type="number" step="0.01" class="form-control" th:field="*{price}" 
                        th:errorClass="is-invalid" placeholder="Prezzo biglietto (€)" aria-label="Prezzo">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                    </div>   
                    
                </div>
                <div class="row mb-3">
                    <div class="col-4">
                        <input type="text" class="form-control" th:field="*{totalTickets}"placeholder="Biglietti disponibili" aria-label ="Biglietti disponibili">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('totalTickets')}" th:errors="*{totalTickets}"></div>
                    </div>
                    <div class="col-md-4">
                        <input type="number" th:field="*{maxTicketsForClient}" class="form-control" min="1" placeholder="Limite biglietti per cliente">
                        <div class="text-danger" th:if="${#fields.hasErrors('maxTicketsForClient')}" th:errors="*{maxTicketsForClient}"></div>
                    </div>
                    <div class="col-4">
                        <input type="text" class="form-control" th:field="*{picture}"placeholder="Inserisci URL dell'immagine" aria-label ="Inserisci URL dell'immagine">
                    </div>
                </div>
                <div class="row mb-3">
                    <div class="d-flex justify-content-around">
                        <a th:href="@{/eventi/}" class="btn btn-secondary">Annulla</a>
                        <button type="submit" class="btn btn-primary">Crea evento</button>
                        
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
