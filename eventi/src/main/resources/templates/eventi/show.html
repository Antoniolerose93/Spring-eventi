<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link th:rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" />
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <title>Dettagli evento</title>
</head>
<body>
    <nav th:replace="~{navbar :: navbar('Eventi')}"></nav> 
    <main>
        <div class="container" th:object="${events}">
            <h2 th:text="*{name}"></h2>
            <hr>
            <div class="row">
                <div class="col-8">
                    <dl>
                        <dt>Evento:</dt>
                        <dd th:text="*{name}"></dd>
                        <dt>Data</dt>
                        <dd th:text="*{date}"></dd>
                        <dt>Luogo</dt>
                        <dd th:text="*{city} + ' - ' + *{location}"></dd>
                        <dt></dt>
                        <dd>
                            <img th:src="*{picture}" class="img-fluid" alt="event-image">
                        </dd>
                         <dt>Biglietti disponibili</dt>
                        <dd th:text="${available}"></dd>
                    </dl>
                </div>
            </div>
        </div>
    </main>
    <script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
