<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link th:rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" />
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <title>Eventi</title>
</head>
<body>
    
    <!-- Navbar -->
    <nav th:replace="~{navbar :: navbar('Eventi')}"></nav> 

    <!-- messaggio per aggiunta eventi -->
    <section class="container">
        <div class="content">    
            <th:block th:if ="${successMessage !=null}">
                <div class ="alert alert-success alert-dismissible fade show" role ="alert">
                    <span th:text="${successMessage}"></span>
                    <button type ="button" class ="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            </th:block>
        
        <!-- titolo centrale -->
        <h1 class="text-center py-3">Eventi in programma</h1>
        <hr/>
        </div>
    </section>

    <main>
        <div class="container">
            <div class="row">
                <!-- ricerca evento -->
                <div class="col-4">
                    <form method="get" th:action="@{/eventi/}">
                        <div class="input-group mb-3">
                            <input name ="keyword" class="form-control" placeholder="cerca evento" aria-label="cerca evento">
                            <input type="date" name="date" class="form-control" aria-label="cerca per data">
                                <button class="btn btn-primary" type="submit">Cerca
                                <i class="bi bi-search"></i>
                                </button>
                        </div>
                    </form>
                </div>
                    
                <!-- inserisci evento -->
                <div class="col-4 ms-auto text-end" sec:authorize="hasAuthority('ADMIN')">
                    <a class="btn btn-primary" th:href="@{/eventi/create}">
                    <i class="bi bi-plus-circle-fill"></i>
                    Inserisci evento</a>
                </div>
            </div>

            <!-- tabella -->
            <table class="table table-striped-columns mt-2" th:if ="${events.size()> 0}">
                <thead>
                    <tr>
                        <th scope="col">Nome</th>
                        <th scope="col">Data</th>
                        <th scope="col">Città</th>
                        <th scope="col">Dettagli</th><!--  dettaglio -->
                        <th scope="col">Acquista</th><!--  acquisto -->
                        <th sec:authorize="hasAuthority('ADMIN')" scope="col">Modifica</th><!--  modifica -->
                        <th sec:authorize="hasAuthority('ADMIN')" scope="col">Elimina</th><!--  cancella -->
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="event : ${events}">
                        <td th:text ="${event.name}"></td>
                        <td th:text ="${event.date}"></td>
                        <td th:text ="${event.city}"></td>
                        
                        <!-- Tasto per il dettaglio -->
                        <td>
                            <a th:href="@{/eventi/show/{id}(id=${event.id})}" class="btn btn-primary">
                                <i class="bi bi-info-square-fill"></i>
                            </a>
                        </td>
                        <!-- Tasto per l'acquisto -->
                        <td>
                            <a th:href="@{/biglietti/acquista/{id}(id=${event.id})}" class="btn btn-success">
                                <i class="bi bi-cart"></i>
                            </a>
                        </td>
                        <!-- Tasto per la modifica -->
                        <td sec:authorize="hasAuthority('ADMIN')">
                            <a th:href="@{/eventi/edit/{id}(id=${event.id})}" class="btn btn-warning">
                                <i class="bi bi-pencil"></i>
                            </a>
                        </td>
                        <td sec:authorize="hasAuthority('ADMIN')">
                        <!-- Tasto per l'eliminazione -->
                            <form th:action="@{/eventi/delete/{id}(id=${event.id})}" method="post" 
                                onsubmit="return confirm('Sei sicuro di voler eliminare questo evento?');" 
                                style="display:inline;">
                                <button type="submit" class="btn btn-danger btn-sm">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div th:unless="${events.size() > 0}" class="alert alert-info">
                Non ci sono eventi in programma.
            </div>
        </div>
    </main>
    <script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
