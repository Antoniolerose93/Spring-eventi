<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link th:rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" />
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <title>Categorie-Eventi</title>
</head>
<body>
    
    <!-- Navbar -->
    <nav th:replace="~{navbar :: navbar('Eventi')}"></nav> 

    <!-- messaggio per aggiunta categoria eventi -->
    <div class="container">
        <div class="content">    
            <th:block th:if ="${successMessage !=null}">
                <div class ="alert alert-warning alert-dismissible fade show" role ="alert">
                    <span th:text="${successMessage}"></span>
                    <button type ="button" class ="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            </th:block>
        
        <!-- titolo centrale -->
        <h1 class="text-center py-3">Categorie di Eventi</h1>
        <hr/>
        </div>
    </div>

    <main>
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6">
                <!-- inserisci categoria di evento -->
                    <form id="eventsCategories-form" th:action="@{/categorie-eventi/create}" method="post" th:object="${eventsCategoriesObj}">
                        <ul th:if="${#fields.hasErrors('*')}">
                             <li th:each="err : ${#fields.errors('*')}" th:text="${err}">Input non corretto</li> 
                             <!--all'interno di #fields.errors possiamo usare * oppure eventsCategoriesObj -->
                        </ul>
                        <div class="input-group mb-3">
                            <input type="text" id="eventCategories" th:field="*{name}" class="form-control">
                            <button type="submit" class="btn btn-primary"> Aggiungi </button>
                        </div>
                    </form>
                    
                <!-- lista categoria eventi -->
                    <ul class="list-group" th:if="${eventsCategoriesList.size() > 0}">
                        <li class="list-group-item d-flex justify-content-between" th:each="category : ${eventsCategoriesList}">
                        <span th:text="|Eventi di questa categoria ${category.events.size()}|"></span>
                        <span th:text="${category.name}"></span>
                        <form th:action="@{/categorie-eventi/delete/{id}(id=${category.id})}" method="post">
                            <button class="btn btn-danger" type="submit" id="deleteButton" 
                                    onclick="return confirm('Sei sicuro?')">
                                    <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </li>
                    <div th:unless="${eventsCategoriesList.size() > 0}" class="alert alert-info">
                    Non ci sono categorie di eventi salvate.
                    </div>
                </ul>
                </div>
            </div>

            
        </div>
    </main>

    <script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
