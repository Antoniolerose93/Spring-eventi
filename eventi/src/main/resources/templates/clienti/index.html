<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link th:rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" />
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <title>Inserisci evento</title>
</head>
<body>
    <nav th:replace="~{navbar :: navbar('Eventi')}"></nav>

    <div class="container">
            <h1 class="text-center py-3">Clienti</h1>
            <hr/>
            <table class="table table-striped mt-3">
                <thead>
                    <tr>
                        <th scope="col">ID</th>
                        <th scope="col" class="text-center">Nome e Cognome</th>
                        <th scope="col" class="text-center">Mail</th>
                        <th scope="col" class="text-center">N° biglietti acquistati</th>
                        <th scope ="col" class="text-center"> Storico acquisti </th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="client:${clients}">
                        <th scope="row" th:text="${client.id}"></th>
                            <td class="text-center" th:text="${client.name} +' '+ ${client.surname}"></td>
                            <td class="text-center" th:text="${client.mail}"></td>
                            <td class="text-center" th:text="${client.nPurchasedTickets}"></td>
                            <td class="text-center"> <a th:href="@{/clienti/storico/{id}(id=${client.id})}" class="btn btn-info btn-sm">
                                <i class="bi bi-ticket"></i>Acquisti
                            </a></td>
                    </tr>
                </tbody>
            </table>
    </div>

    <script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
