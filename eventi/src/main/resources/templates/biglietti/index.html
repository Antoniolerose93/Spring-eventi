<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link th:rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" />
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <title>Biglietti</title>
</head>
<body>
    <nav th:replace="~{navbar :: navbar('Eventi')}"></nav>
    <main>
        <div class="container mt-5">
            <div class="content">
                <h1 class="text-center py-3">Acquista il tuo biglietto</h1>
                <hr/>
                <div class="row mt-4">
                    <div class="col-md-4 mb-4" th:each="event : ${eventsList}">
                        <div class="card border border-dark border-1 h-100">
                        <img th:src="${event.picture}" class="event-img card-img-top" alt="foto-evento">
                            <div class="card-body">
                                <h5 class="card-title" th:text="${event.name}"></h5>
                                    <div class="row mb-2">
                                        <div class="col">
                                            <p class="card-text"><strong>Posti disponibili: </strong>
                                             <span th:with= "rimasti=${event.totalTickets - event.soldTickets}" 
                                                th:text= "${rimasti}"
                                                th:class="${rimasti lt 10} ? 'text-danger fw-bold' : 'text-dark'"></span></p>
                                        </div>
                                        <div class="col">
                                            <p class="card-text"><strong>Evento: </strong><span th:text= " ${event.name}"></span></p>
                                        </div>
                                    </div>  
                                    <div class="row mb-2">
                                        <div class="col">
                                            <p class="card-text"><strong>Luogo:</strong><span th:text="| ${event.city} - ${event.location}|"></span></p>
                                        </div>
                                        <div class="col">
                                            <p class ="card-text"><strong>Prezzo:</strong><span th:text="| ${event.price}€|"></span></p>
                                        </div>
                                    </div>
                                    <div class="row mb-2">
                                        <div class="col">
                                            <p class ="card-text"><strong>Data: </strong><span th:text=" ${event.date}"></span></p>
                                        </div>
                                        <div class="col">
                                            <a th:href="@{/biglietti/acquista/{id}(id=${event.id})}" class="btn btn-success">Acquista biglietti</a>
                                        </div>
                                    </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script th:src="@{/webjars/bootstrap/5.3.8/js/bootstrap.bundle.min.js}"></script>
</body>
